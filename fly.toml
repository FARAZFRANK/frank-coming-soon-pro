# fly.toml app configuration file generated for coming-soon-maintenance-page on 2026-04-24T14:29:59+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'coming-soon-maintenance-page'
primary_region = 'bom'

[env] 
  PORT = '3000'
  HOST = '0.0.0.0'
  SHOPIFY_APP_URL = 'https://coming-soon-maintenance-page.fly.dev'
  SHOPIFY_API_KEY = '0955e12f5de833db49e2a6d2fd067a9e'
  SCOPES = 'read_content,read_files,read_themes,write_content,write_files,write_products'

[build]

[[mounts]]
  source = 'data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
